name: mcp-server

on:
  push:
    branches: [main]
    paths:
      - "crates/agentkeys-mcp-server/**"
      - "crates/agentkeys-backend-client/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/mcp-server.yml"
  pull_request:
    paths:
      - "crates/agentkeys-mcp-server/**"
      - "crates/agentkeys-backend-client/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/mcp-server.yml"

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: test + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned by rust-toolchain.toml (channel + clippy) — single source of
      # truth shared with local dev; never a floating @stable.
      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      # The tests/ suite includes transport_conformance.rs (#207) — it boots the
      # REAL binary as a subprocess and drives it as an MCP client over HTTP +
      # stdio, asserting protocol conformance (initialize, tools/list schemas,
      # auth gating, well-formed tools/call round-trips, clean stdio stream)
      # against the REAL http backend (BackendClient → broker). This is the
      # Rust, no-python replacement for the former bash+python
      # mcp-demo-mode-{a,b,c,d,e}.sh demos (curl / Anthropic SDK / xiaozhi
      # ServerMCPClient / WS relay / stdio_client) — real backend, no in-memory
      # fixture. CONFORMANCE_BROKER_URL points the round-trip at the public
      # broker; if it's unreachable the tool-call degrades to a well-formed
      # connection error, so this stays green + flake-free either way.
      - name: cargo test (incl. real-backend transport-conformance)
        env:
          CONFORMANCE_BROKER_URL: https://broker.litentry.org
        run: cargo test -p agentkeys-mcp-server --all-features
      - name: cargo clippy
        run: cargo clippy -p agentkeys-mcp-server --all-targets -- -D warnings

  image:
    name: build + publish image
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve lowercase image name
        id: img
        # GHCR repository names MUST be lowercase. ${{ github.repository }} keeps
        # the repo's actual casing (litentry/agentKeys → capital K), which docker
        # rejects with "repository name must be lowercase". Lowercase via tr
        # (portable to bash 3.2; AGENTS.md prefers tr over the bash-4 ${,,}).
        run: echo "base=ghcr.io/$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')/agentkeys-mcp-server" >> "$GITHUB_OUTPUT"
      - name: build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/agentkeys-mcp-server/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.base }}:latest
            ${{ steps.img.outputs.base }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

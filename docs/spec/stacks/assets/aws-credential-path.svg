<svg viewBox="0 0 1240 720" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="aArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f46e5"/>
    </marker>
    <marker id="aGrey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="aEmerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#047857"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1240" height="720" fill="#ffffff"/>

  <text x="40" y="42" font-size="23" font-weight="bold" fill="#0f172a">AWS stack — credential path (improved: + client-side per-actor KEK)</text>
  <text x="40" y="68" font-size="14" fill="#475569">Enforcement lives in cloud infrastructure the broker does not control. The broker leaves the path after issuing the JWT.</text>

  <!-- credential path band -->
  <rect x="32" y="96" width="1176" height="164" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="48" y="120" font-size="12" font-weight="bold" fill="#64748b">CREDENTIAL PATH</text>

  <!-- actor -->
  <rect x="48" y="134" width="196" height="106" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="146" y="162" font-size="14" font-weight="bold" fill="#3730a3" text-anchor="middle">Actor</text>
  <text x="146" y="182" font-size="12" fill="#475569" text-anchor="middle">daemon / delegate</text>
  <rect x="62" y="196" width="168" height="30" rx="6" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="146" y="215" font-size="11" fill="#047857" text-anchor="middle">encrypts under per-actor KEK</text>

  <!-- broker -->
  <rect x="292" y="134" width="196" height="106" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="390" y="162" font-size="14" font-weight="bold" fill="#3730a3" text-anchor="middle">Broker</text>
  <text x="390" y="182" font-size="12" fill="#475569" text-anchor="middle">mints OIDC JWT</text>
  <text x="390" y="199" font-size="12" fill="#475569" text-anchor="middle">(carries actor tag claim)</text>
  <rect x="306" y="208" width="168" height="22" rx="6" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="390" y="223" font-size="10.5" fill="#047857" text-anchor="middle">mint needs no credential</text>

  <!-- sts -->
  <rect x="536" y="134" width="212" height="106" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="642" y="162" font-size="14" font-weight="bold" fill="#3730a3" text-anchor="middle">AWS STS</text>
  <text x="642" y="182" font-size="12" fill="#475569" text-anchor="middle">AssumeRoleWithWebIdentity</text>
  <rect x="550" y="194" width="184" height="24" rx="6" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="642" y="210" font-size="11" font-weight="bold" fill="#a16207" text-anchor="middle">ANONYMOUS — client calls it</text>
  <text x="642" y="232" font-size="11" fill="#64748b" text-anchor="middle">returns short-lived creds</text>

  <!-- worker -->
  <rect x="796" y="134" width="180" height="106" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="886" y="162" font-size="14" font-weight="bold" fill="#3730a3" text-anchor="middle">Worker</text>
  <text x="886" y="182" font-size="12" fill="#475569" text-anchor="middle">passive relay</text>
  <rect x="810" y="196" width="152" height="30" rx="6" fill="#e0e7ff" stroke="#a5b4fc"/>
  <text x="886" y="215" font-size="10.5" fill="#3730a3" text-anchor="middle">chain-verify (layer 2)</text>

  <!-- s3 -->
  <rect x="1024" y="134" width="168" height="106" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="1108" y="162" font-size="14" font-weight="bold" fill="#3730a3" text-anchor="middle">S3</text>
  <text x="1108" y="182" font-size="12" fill="#475569" text-anchor="middle">per-data-class bucket</text>
  <text x="1108" y="204" font-size="11" fill="#64748b" text-anchor="middle">bots/&lt;actor&gt;/…</text>
  <rect x="1038" y="212" width="140" height="22" rx="6" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="1108" y="227" font-size="10.5" fill="#047857" text-anchor="middle">ciphertext only</text>

  <!-- arrows -->
  <line x1="244" y1="187" x2="288" y2="187" stroke="#4f46e5" stroke-width="2" marker-end="url(#aArrow)"/>
  <line x1="488" y1="187" x2="532" y2="187" stroke="#4f46e5" stroke-width="2" marker-end="url(#aArrow)"/>
  <line x1="748" y1="187" x2="792" y2="187" stroke="#4f46e5" stroke-width="2" marker-end="url(#aArrow)"/>
  <line x1="976" y1="187" x2="1020" y2="187" stroke="#4f46e5" stroke-width="2" marker-end="url(#aArrow)"/>

  <!-- broker exits path -->
  <rect x="292" y="292" width="456" height="74" rx="10" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="310" y="316" font-size="13" font-weight="bold" fill="#a16207">Broker exits here — no chokepoint</text>
  <text x="310" y="336" font-size="12" fill="#475569">Once the JWT is minted the client redeems it directly. The broker cannot</text>
  <text x="310" y="353" font-size="12" fill="#475569">observe, meter, revoke or stop the exchange within the JWT's TTL.</text>
  <line x1="420" y1="288" x2="420" y2="246" stroke="#a16207" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#aGrey)"/>

  <!-- enforcement panel -->
  <rect x="796" y="292" width="396" height="120" rx="10" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="814" y="316" font-size="13" font-weight="bold" fill="#047857">Layer 3 — enforced by infrastructure</text>
  <text x="814" y="338" font-size="12" fill="#334155">Static bucket policy keyed on</text>
  <text x="814" y="357" font-size="12" font-family="monospace" fill="#0f172a">${aws:PrincipalTag/agentkeys_actor_omni}</text>
  <text x="814" y="378" font-size="12" fill="#334155">Provisioned out-of-band by the admin identity —</text>
  <text x="814" y="395" font-size="12" font-weight="bold" fill="#047857">the broker cannot change the enforcement rule.</text>
  <line x1="994" y1="288" x2="1080" y2="246" stroke="#047857" stroke-width="1.6" marker-end="url(#aEmerald)"/>

  <!-- chain -->
  <rect x="48" y="292" width="196" height="120" rx="10" fill="#e0e7ff" stroke="#a5b4fc"/>
  <text x="146" y="318" font-size="13" font-weight="bold" fill="#3730a3" text-anchor="middle">On-chain registry</text>
  <text x="146" y="340" font-size="11.5" fill="#475569" text-anchor="middle">grants + scope</text>
  <text x="146" y="362" font-size="11.5" fill="#475569" text-anchor="middle">re-verified by the</text>
  <text x="146" y="379" font-size="11.5" fill="#475569" text-anchor="middle">worker only</text>
  <text x="146" y="399" font-size="11" fill="#64748b" text-anchor="middle">(not on the mint path)</text>
  <path d="M 146 412 L 146 434 L 772 434 L 772 215 L 788 215" fill="none" stroke="#4f46e5" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#aArrow)"/>

  <!-- residual risk -->
  <rect x="32" y="452" width="1176" height="106" rx="12" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="52" y="478" font-size="14" font-weight="bold" fill="#b91c1c">Residual risk — a compromised broker</text>
  <text x="52" y="500" font-size="12.5" fill="#334155">The broker holds the session keypair, so it can mint a JWT asserting ANY actor and AWS will honour it — there is no independent</text>
  <text x="52" y="519" font-size="12.5" fill="#334155">re-verification behind the token. Blast radius is bounded to <tspan font-weight="bold">one actor per forged token</tspan> (the bucket policy pins a single prefix),</text>
  <text x="52" y="538" font-size="12.5" fill="#334155">so an attacker must impersonate victims one at a time — but nothing detects or stops the impersonation itself.</text>

  <!-- layer legend -->
  <text x="40" y="596" font-size="12" font-weight="bold" fill="#64748b">DEFENCE LAYERS (§17.5)</text>
  <rect x="40" y="608" width="270" height="30" rx="6" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="54" y="628" font-size="11.5" fill="#3730a3">1 · broker cap-mint (grant + actor==session)</text>
  <rect x="326" y="608" width="230" height="30" rx="6" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="340" y="628" font-size="11.5" fill="#3730a3">2 · worker chain-verify</text>
  <rect x="572" y="608" width="290" height="30" rx="6" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="586" y="628" font-size="11.5" fill="#047857">3 · PrincipalTag bucket policy (independent)</text>
  <rect x="878" y="608" width="272" height="30" rx="6" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="892" y="628" font-size="11.5" fill="#047857">4 · per-data-class roles + buckets</text>

  <text x="40" y="672" font-size="11.5" fill="#64748b">Confidentiality does not depend on IAM: objects are client-encrypted under the signer-derived per-actor KEK. IAM is defence-in-depth.</text>
  <text x="40" y="692" font-size="11.5" fill="#64748b">Credential issuance is invisible to the broker — auditing it requires CloudTrail, out-of-band.</text>
</svg>

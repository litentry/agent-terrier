<svg viewBox="0 0 1320 800" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="vArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f46e5"/>
    </marker>
    <marker id="vEmerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#047857"/>
    </marker>
    <marker id="vGrey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1320" height="800" fill="#ffffff"/>

  <text x="40" y="42" font-size="23" font-weight="bold" fill="#0f172a">VE stack — desired credential path (Variant B+: signer-held AK/SK, chain-validated)</text>
  <text x="40" y="68" font-size="14" fill="#475569">VE has no session-tag mechanism, so enforcement moves into components we own — split across two parties, anchored on chain.</text>

  <!-- credential path band -->
  <rect x="32" y="96" width="1256" height="164" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="48" y="120" font-size="12" font-weight="bold" fill="#64748b">CREDENTIAL PATH</text>
  <text x="1272" y="120" font-size="12" font-weight="bold" fill="#64748b" text-anchor="end">every credential passes through TWO independent decisions</text>

  <!-- actor -->
  <rect x="48" y="134" width="168" height="108" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="132" y="162" font-size="14" font-weight="bold" fill="#3730a3" text-anchor="middle">Actor</text>
  <text x="132" y="181" font-size="11.5" fill="#475569" text-anchor="middle">daemon / delegate</text>
  <rect x="60" y="194" width="144" height="34" rx="6" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="132" y="209" font-size="10" fill="#047857" text-anchor="middle">encrypts under</text>
  <text x="132" y="222" font-size="10" fill="#047857" text-anchor="middle">per-actor KEK</text>

  <!-- broker -->
  <rect x="248" y="134" width="180" height="108" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="338" y="162" font-size="14" font-weight="bold" fill="#3730a3" text-anchor="middle">Broker</text>
  <text x="338" y="181" font-size="11.5" fill="#475569" text-anchor="middle">mints OIDC JWT</text>
  <text x="338" y="197" font-size="11.5" fill="#475569" text-anchor="middle">+ PROPOSES policy</text>
  <rect x="260" y="206" width="156" height="24" rx="6" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="338" y="222" font-size="10" fill="#047857" text-anchor="middle">AK/SK REMOVED</text>

  <!-- signer (the star) -->
  <rect x="460" y="126" width="232" height="124" rx="10" fill="#d1fae5" stroke="#047857" stroke-width="2.5"/>
  <text x="576" y="152" font-size="14.5" font-weight="bold" fill="#047857" text-anchor="middle">Signer</text>
  <text x="576" y="171" font-size="11.5" fill="#334155" text-anchor="middle">holds the VE AK/SK</text>
  <rect x="474" y="182" width="204" height="56" rx="6" fill="#ffffff" stroke="#6ee7b7"/>
  <text x="576" y="199" font-size="11" font-weight="bold" fill="#047857" text-anchor="middle">VALIDATES, then SigV4-signs</text>
  <text x="576" y="215" font-size="10" fill="#475569" text-anchor="middle">refuses to sign a policy it cannot</text>
  <text x="576" y="228" font-size="10" fill="#475569" text-anchor="middle">independently justify</text>

  <!-- ve sts -->
  <rect x="724" y="134" width="186" height="108" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="817" y="162" font-size="14" font-weight="bold" fill="#3730a3" text-anchor="middle">VE STS</text>
  <text x="817" y="181" font-size="11.5" fill="#475569" text-anchor="middle">AssumeRoleWithOIDC</text>
  <rect x="736" y="192" width="162" height="24" rx="6" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="817" y="208" font-size="10.5" font-weight="bold" fill="#a16207" text-anchor="middle">SIGNED (SigV4) call</text>
  <text x="817" y="231" font-size="10.5" fill="#64748b" text-anchor="middle">creds, TTL ≤ 900s</text>

  <!-- worker -->
  <rect x="942" y="134" width="156" height="108" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="1020" y="162" font-size="14" font-weight="bold" fill="#3730a3" text-anchor="middle">Worker</text>
  <text x="1020" y="181" font-size="11.5" fill="#475569" text-anchor="middle">passive relay</text>
  <rect x="954" y="194" width="132" height="32" rx="6" fill="#e0e7ff" stroke="#a5b4fc"/>
  <text x="1020" y="214" font-size="10" fill="#3730a3" text-anchor="middle">chain-verify (layer 2)</text>

  <!-- tos -->
  <rect x="1130" y="134" width="142" height="108" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="1201" y="162" font-size="14" font-weight="bold" fill="#3730a3" text-anchor="middle">TOS</text>
  <text x="1201" y="181" font-size="11" fill="#475569" text-anchor="middle">per-class bucket</text>
  <text x="1201" y="199" font-size="10.5" fill="#64748b" text-anchor="middle">bots/&lt;actor&gt;/…</text>
  <rect x="1142" y="206" width="118" height="24" rx="6" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="1201" y="222" font-size="10" fill="#047857" text-anchor="middle">ciphertext only</text>

  <!-- arrows -->
  <line x1="216" y1="188" x2="244" y2="188" stroke="#4f46e5" stroke-width="2" marker-end="url(#vArrow)"/>
  <line x1="428" y1="188" x2="456" y2="188" stroke="#4f46e5" stroke-width="2" marker-end="url(#vArrow)"/>
  <line x1="692" y1="188" x2="720" y2="188" stroke="#047857" stroke-width="2.5" marker-end="url(#vEmerald)"/>
  <line x1="910" y1="188" x2="938" y2="188" stroke="#4f46e5" stroke-width="2" marker-end="url(#vArrow)"/>
  <line x1="1098" y1="188" x2="1126" y2="188" stroke="#4f46e5" stroke-width="2" marker-end="url(#vArrow)"/>

  <!-- co-location caveat -->
  <rect x="238" y="112" width="466" height="152" rx="12" fill="none" stroke="#a16207" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="471" y="284" font-size="11.5" font-weight="bold" fill="#a16207" text-anchor="middle">same host today (:8092 loopback) — separate for the full benefit</text>

  <!-- validation panel -->
  <rect x="378" y="306" width="500" height="176" rx="10" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="396" y="330" font-size="13.5" font-weight="bold" fill="#047857">The signer refuses to sign unless ALL hold</text>
  <text x="396" y="354" font-size="12" fill="#334155"><tspan font-weight="bold">1</tspan>  session JWT verifies against the broker session pubkey</text>
  <text x="396" y="376" font-size="12" fill="#334155"><tspan font-weight="bold">2</tspan>  policy resources ⊆ <tspan font-family="monospace" font-size="11">bots/&lt;actor&gt;/*</tspan> — actor taken from</text>
  <text x="414" y="393" font-size="12" fill="#334155">the JWT, never from a caller-supplied field</text>
  <text x="396" y="417" font-size="12" fill="#334155"><tspan font-weight="bold">3</tspan>  the actor's grant <tspan font-weight="bold" fill="#047857">EXISTS ON CHAIN</tspan>  ← the B+ upgrade</text>
  <text x="396" y="441" font-size="12" fill="#334155"><tspan font-weight="bold">4</tspan>  role TRN matches the policy's bucket class</text>
  <text x="396" y="463" font-size="12" fill="#334155"><tspan font-weight="bold">5</tspan>  TTL ≤ ceiling (900s)</text>
  <line x1="576" y1="302" x2="576" y2="256" stroke="#047857" stroke-width="1.8" marker-end="url(#vEmerald)"/>

  <!-- chain -->
  <rect x="48" y="306" width="290" height="176" rx="10" fill="#e0e7ff" stroke="#a5b4fc"/>
  <text x="193" y="332" font-size="13.5" font-weight="bold" fill="#3730a3" text-anchor="middle">On-chain registry</text>
  <text x="193" y="354" font-size="11.5" fill="#475569" text-anchor="middle">grants + scope — the trust root</text>
  <rect x="64" y="368" width="258" height="44" rx="6" fill="#ffffff" stroke="#6ee7b7"/>
  <text x="193" y="386" font-size="11" font-weight="bold" fill="#047857" text-anchor="middle">re-verified at CREDENTIAL ISSUANCE</text>
  <text x="193" y="402" font-size="10.5" fill="#475569" text-anchor="middle">(new — the layer-2 pattern, one step earlier)</text>
  <rect x="64" y="420" width="258" height="30" rx="6" fill="#ffffff" stroke="#a5b4fc"/>
  <text x="193" y="440" font-size="11" fill="#3730a3" text-anchor="middle">re-verified again at DATA ACCESS</text>
  <text x="193" y="468" font-size="11" fill="#64748b" text-anchor="middle">a compromised broker cannot forge the chain</text>
  <line x1="338" y1="394" x2="374" y2="394" stroke="#047857" stroke-width="2" marker-end="url(#vEmerald)"/>

  <!-- gain -->
  <rect x="908" y="306" width="380" height="176" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="926" y="330" font-size="13.5" font-weight="bold" fill="#3730a3">What the split buys</text>
  <text x="926" y="354" font-size="12" fill="#334155">• Authorizer ≠ credential-issuer — two</text>
  <text x="938" y="371" font-size="12" fill="#334155">independent parties must agree</text>
  <text x="926" y="393" font-size="12" fill="#334155">• A compromised broker can forge a JWT but</text>
  <text x="938" y="410" font-size="12" fill="#334155">cannot satisfy rule 3 for a missing grant</text>
  <text x="926" y="432" font-size="12" fill="#334155">• Issuance is a <tspan font-weight="bold">chokepoint</tspan> — audit, meter,</text>
  <text x="938" y="449" font-size="12" fill="#334155">rate-limit, kill-switch all attach here</text>
  <text x="926" y="471" font-size="12" fill="#334155">• Standing credential sits on the <tspan font-weight="bold">less</tspan> exposed host</text>

  <!-- verdict -->
  <rect x="32" y="518" width="1256" height="92" rx="12" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="52" y="546" font-size="14" font-weight="bold" fill="#047857">Net effect — this is the one axis where VE ends up ahead of AWS</text>
  <text x="52" y="570" font-size="12.5" fill="#334155">On AWS a compromised broker mints a JWT asserting any actor and the cloud honours it — no independent re-verification exists behind the token.</text>
  <text x="52" y="590" font-size="12.5" fill="#334155">Here the same forged JWT is checked against the chain before a credential is issued, so forging identity is no longer sufficient to obtain data access.</text>

  <!-- layers -->
  <text x="40" y="646" font-size="12" font-weight="bold" fill="#64748b">DEFENCE LAYERS (§17.5) — VE after M1 + M2 + B+</text>
  <rect x="40" y="658" width="278" height="30" rx="6" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="54" y="678" font-size="11.5" fill="#3730a3">1 · broker cap-mint (unchanged)</text>
  <rect x="334" y="658" width="232" height="30" rx="6" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="348" y="678" font-size="11.5" fill="#3730a3">2 · worker chain-verify</text>
  <rect x="582" y="658" width="336" height="30" rx="6" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="596" y="678" font-size="11.5" fill="#047857">3 · signer validation + chain re-verify (independent)</text>
  <rect x="934" y="658" width="354" height="30" rx="6" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="948" y="678" font-size="11.5" fill="#047857">4 · per-data-class roles + buckets (M1 — to provision)</text>

  <text x="40" y="722" font-size="11.5" fill="#64748b">Still open: encryption protects confidentiality, not integrity — deny Delete in the session policy + enable bucket versioning (M11).</text>
  <text x="40" y="742" font-size="11.5" fill="#64748b">Still open: the AK/SK is relocated, not eliminated — instance-role / IMDS would remove it entirely (port-spec follow-up 6).</text>
  <text x="40" y="762" font-size="11.5" fill="#64748b">Chain re-verify at issuance costs an RPC on the mint path — mint per data session, not per op. Do not cache grant state in the signer.</text>
</svg>
